apiVersion: dataprotection.archinfra.io/v1alpha1
kind: BackupPolicy
metadata:
  name: milvus-prod-nightly
  namespace: backup-system
spec:
  sourceRef:
    name: milvus-prod
  storageRefs:
    - name: minio-primary
  schedule:
    cron: "0 2 * * *"
    concurrencyPolicy: Forbid
  retentionRef:
    name: keep-last-3
  notificationRefs:
    - name: ops-webhook
