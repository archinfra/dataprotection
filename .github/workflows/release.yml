name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      publish_dockerhub: ${{ steps.meta.outputs.publish_dockerhub }}
      publish_aliyun: ${{ steps.meta.outputs.publish_aliyun }}
      dockerhub_namespace: ${{ steps.meta.outputs.dockerhub_namespace }}
      aliyun_registry: ${{ steps.meta.outputs.aliyun_registry }}
      aliyun_namespace: ${{ steps.meta.outputs.aliyun_namespace }}
      operator_tags: ${{ steps.meta.outputs.operator_tags }}
      mc_dockerhub: ${{ steps.meta.outputs.mc_dockerhub }}
      mc_aliyun: ${{ steps.meta.outputs.mc_aliyun }}
      busybox_dockerhub: ${{ steps.meta.outputs.busybox_dockerhub }}
      busybox_aliyun: ${{ steps.meta.outputs.busybox_aliyun }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute metadata
        id: meta
        shell: bash
        env:
          INPUT_DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE }}
          INPUT_ALIYUN_REGISTRY: ${{ vars.ALIYUN_REGISTRY }}
          INPUT_ALIYUN_NAMESPACE: ${{ vars.ALIYUN_NAMESPACE }}
          INPUT_PUBLISH_DOCKERHUB: ${{ vars.PUBLISH_DOCKERHUB }}
          INPUT_PUBLISH_ALIYUN: ${{ vars.PUBLISH_ALIYUN }}
        run: |
          set -euo pipefail
          version="$(cat VERSION)"
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          dockerhub_namespace="${INPUT_DOCKERHUB_NAMESPACE:-$owner}"
          aliyun_registry="${INPUT_ALIYUN_REGISTRY:-}"
          aliyun_namespace="${INPUT_ALIYUN_NAMESPACE:-$owner}"
          publish_dockerhub="${INPUT_PUBLISH_DOCKERHUB:-true}"
          publish_aliyun="${INPUT_PUBLISH_ALIYUN:-true}"
          short_sha="${GITHUB_SHA::12}"

          [[ "${publish_dockerhub}" == "true" || "${publish_dockerhub}" == "false" ]] || { echo "PUBLISH_DOCKERHUB must be true or false" >&2; exit 1; }
          [[ "${publish_aliyun}" == "true" || "${publish_aliyun}" == "false" ]] || { echo "PUBLISH_ALIYUN must be true or false" >&2; exit 1; }
          if [[ "${publish_dockerhub}" != "true" && "${publish_aliyun}" != "true" ]]; then
            echo "At least one publish target must be enabled" >&2
            exit 1
          fi

          operator_tags=()
          if [[ "${publish_dockerhub}" == "true" ]]; then
            operator_tags+=("docker.io/${dockerhub_namespace}/dataprotection-operator:${version}")
            operator_tags+=("docker.io/${dockerhub_namespace}/dataprotection-operator:sha-${short_sha}")
          fi
          if [[ "${publish_aliyun}" == "true" && -n "${aliyun_registry}" ]]; then
            operator_tags+=("${aliyun_registry}/${aliyun_namespace}/dataprotection-operator:${version}")
            operator_tags+=("${aliyun_registry}/${aliyun_namespace}/dataprotection-operator:sha-${short_sha}")
          fi
          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            if [[ "${publish_dockerhub}" == "true" ]]; then
              operator_tags+=("docker.io/${dockerhub_namespace}/dataprotection-operator:latest")
            fi
            if [[ "${publish_aliyun}" == "true" && -n "${aliyun_registry}" ]]; then
              operator_tags+=("${aliyun_registry}/${aliyun_namespace}/dataprotection-operator:latest")
            fi
          fi
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            ref_tag="${GITHUB_REF_NAME}"
            if [[ "${publish_dockerhub}" == "true" ]]; then
              operator_tags+=("docker.io/${dockerhub_namespace}/dataprotection-operator:${ref_tag}")
            fi
            if [[ "${publish_aliyun}" == "true" && -n "${aliyun_registry}" ]]; then
              operator_tags+=("${aliyun_registry}/${aliyun_namespace}/dataprotection-operator:${ref_tag}")
            fi
          fi

          {
            echo "version=${version}"
            echo "publish_dockerhub=${publish_dockerhub}"
            echo "publish_aliyun=${publish_aliyun}"
            echo "dockerhub_namespace=${dockerhub_namespace}"
            echo "aliyun_registry=${aliyun_registry}"
            echo "aliyun_namespace=${aliyun_namespace}"
            if [[ "${publish_dockerhub}" == "true" ]]; then
              echo "mc_dockerhub=docker.io/${dockerhub_namespace}/dataprotection-minio-mc:latest"
              echo "busybox_dockerhub=docker.io/${dockerhub_namespace}/dataprotection-busybox:v1"
            else
              echo "mc_dockerhub="
              echo "busybox_dockerhub="
            fi
            if [[ "${publish_aliyun}" == "true" ]]; then
              echo "mc_aliyun=${aliyun_registry}/${aliyun_namespace}/dataprotection-minio-mc:latest"
              echo "busybox_aliyun=${aliyun_registry}/${aliyun_namespace}/dataprotection-busybox:v1"
            else
              echo "mc_aliyun="
              echo "busybox_aliyun="
            fi
            echo "operator_tags<<EOF"
            printf '%s\n' "${operator_tags[@]}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

  verify:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Bootstrap
        run: bash hack/bootstrap-dev-env.sh

      - name: Module tidy check
        run: |
          make mod-tidy
          git diff --exit-code go.mod go.sum

      - name: Generate and test
        run: |
          make generate
          git diff --exit-code
          make manifests
          git diff --exit-code
          make test

  publish-images:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate registry configuration
        shell: bash
        env:
          PUBLISH_DOCKERHUB: ${{ needs.prepare.outputs.publish_dockerhub }}
          PUBLISH_ALIYUN: ${{ needs.prepare.outputs.publish_aliyun }}
          ALIYUN_REGISTRY: ${{ needs.prepare.outputs.aliyun_registry }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          ALIYUN_USERNAME: ${{ secrets.ALIYUN_USERNAME }}
          ALIYUN_PASSWORD: ${{ secrets.ALIYUN_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ "${PUBLISH_DOCKERHUB}" == "true" ]]; then
            [[ -n "${DOCKERHUB_USERNAME}" ]] || { echo "missing secret DOCKERHUB_USERNAME" >&2; exit 1; }
            [[ -n "${DOCKERHUB_TOKEN}" ]] || { echo "missing secret DOCKERHUB_TOKEN" >&2; exit 1; }
          fi
          if [[ "${PUBLISH_ALIYUN}" == "true" ]]; then
            [[ -n "${ALIYUN_REGISTRY}" ]] || { echo "missing variable ALIYUN_REGISTRY" >&2; exit 1; }
            [[ -n "${ALIYUN_USERNAME}" ]] || { echo "missing secret ALIYUN_USERNAME" >&2; exit 1; }
            [[ -n "${ALIYUN_PASSWORD}" ]] || { echo "missing secret ALIYUN_PASSWORD" >&2; exit 1; }
          fi

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Configure Docker Hub mirror
        run: |
          echo '{"registry-mirrors":["https://mirror.gcr.io"]}' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-config-inline: |
            [registry."docker.io"]
              mirrors = ["mirror.gcr.io"]

      - name: Login Docker Hub
        if: needs.prepare.outputs.publish_dockerhub == 'true'
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login Aliyun registry
        if: needs.prepare.outputs.publish_aliyun == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ needs.prepare.outputs.aliyun_registry }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      - name: Build and push operator image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ needs.prepare.outputs.operator_tags }}

      - name: Mirror runtime images
        shell: bash
        env:
          MC_DOCKERHUB: ${{ needs.prepare.outputs.mc_dockerhub }}
          MC_ALIYUN: ${{ needs.prepare.outputs.mc_aliyun }}
          BUSYBOX_DOCKERHUB: ${{ needs.prepare.outputs.busybox_dockerhub }}
          BUSYBOX_ALIYUN: ${{ needs.prepare.outputs.busybox_aliyun }}
        run: |
          set -euo pipefail
          create_aliases() {
            local source="$1"
            shift
            local tags=()
            for value in "$@"; do
              if [[ -n "${value}" ]]; then
                tags+=("--tag" "${value}")
              fi
            done
            if (( ${#tags[@]} > 0 )); then
              docker buildx imagetools create "${tags[@]}" "${source}"
            fi
          }

          create_aliases "minio/mc:latest" "${MC_DOCKERHUB}" "${MC_ALIYUN}"
          create_aliases "registry.cn-beijing.aliyuncs.com/kube4/busybox:v1" "${BUSYBOX_DOCKERHUB}" "${BUSYBOX_ALIYUN}"

  build-installers:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - verify
    strategy:
      fail-fast: false
      matrix:
        arch:
          - amd64
          - arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Configure Docker Hub mirror
        run: |
          echo '{"registry-mirrors":["https://mirror.gcr.io"]}' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-config-inline: |
            [registry."docker.io"]
              mirrors = ["mirror.gcr.io"]

      - name: Build offline installer
        run: bash build.sh --arch ${{ matrix.arch }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: data-protection-operator-${{ matrix.arch }}
          path: dist/data-protection-operator-${{ matrix.arch }}.run*

  release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs:
      - build-installers
      - publish-images
    steps:
      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          pattern: data-protection-operator-*
          path: dist

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.run
            dist/**/*.sha256
