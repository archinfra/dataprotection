name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      dockerhub_namespace: ${{ steps.meta.outputs.dockerhub_namespace }}
      aliyun_registry: ${{ steps.meta.outputs.aliyun_registry }}
      aliyun_namespace: ${{ steps.meta.outputs.aliyun_namespace }}
      operator_tags: ${{ steps.meta.outputs.operator_tags }}
      mysql_dockerhub: ${{ steps.meta.outputs.mysql_dockerhub }}
      mysql_aliyun: ${{ steps.meta.outputs.mysql_aliyun }}
      mc_dockerhub: ${{ steps.meta.outputs.mc_dockerhub }}
      mc_aliyun: ${{ steps.meta.outputs.mc_aliyun }}
      busybox_dockerhub: ${{ steps.meta.outputs.busybox_dockerhub }}
      busybox_aliyun: ${{ steps.meta.outputs.busybox_aliyun }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute metadata
        id: meta
        shell: bash
        env:
          INPUT_DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE }}
          INPUT_ALIYUN_REGISTRY: ${{ vars.ALIYUN_REGISTRY }}
          INPUT_ALIYUN_NAMESPACE: ${{ vars.ALIYUN_NAMESPACE }}
        run: |
          set -euo pipefail
          version="$(cat VERSION)"
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          dockerhub_namespace="${INPUT_DOCKERHUB_NAMESPACE:-$owner}"
          aliyun_registry="${INPUT_ALIYUN_REGISTRY:-}"
          aliyun_namespace="${INPUT_ALIYUN_NAMESPACE:-$owner}"
          short_sha="${GITHUB_SHA::12}"

          operator_tags=()
          operator_tags+=("docker.io/${dockerhub_namespace}/dataprotection-operator:${version}")
          operator_tags+=("docker.io/${dockerhub_namespace}/dataprotection-operator:sha-${short_sha}")
          if [[ -n "${aliyun_registry}" ]]; then
            operator_tags+=("${aliyun_registry}/${aliyun_namespace}/dataprotection-operator:${version}")
            operator_tags+=("${aliyun_registry}/${aliyun_namespace}/dataprotection-operator:sha-${short_sha}")
          fi
          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            operator_tags+=("docker.io/${dockerhub_namespace}/dataprotection-operator:latest")
            if [[ -n "${aliyun_registry}" ]]; then
              operator_tags+=("${aliyun_registry}/${aliyun_namespace}/dataprotection-operator:latest")
            fi
          fi
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            ref_tag="${GITHUB_REF_NAME}"
            operator_tags+=("docker.io/${dockerhub_namespace}/dataprotection-operator:${ref_tag}")
            if [[ -n "${aliyun_registry}" ]]; then
              operator_tags+=("${aliyun_registry}/${aliyun_namespace}/dataprotection-operator:${ref_tag}")
            fi
          fi

          {
            echo "version=${version}"
            echo "dockerhub_namespace=${dockerhub_namespace}"
            echo "aliyun_registry=${aliyun_registry}"
            echo "aliyun_namespace=${aliyun_namespace}"
            echo "mysql_dockerhub=docker.io/${dockerhub_namespace}/dataprotection-mysql:8.0.45"
            echo "mc_dockerhub=docker.io/${dockerhub_namespace}/dataprotection-minio-mc:latest"
            echo "busybox_dockerhub=docker.io/${dockerhub_namespace}/dataprotection-busybox:1.36"
            echo "mysql_aliyun=${aliyun_registry}/${aliyun_namespace}/dataprotection-mysql:8.0.45"
            echo "mc_aliyun=${aliyun_registry}/${aliyun_namespace}/dataprotection-minio-mc:latest"
            echo "busybox_aliyun=${aliyun_registry}/${aliyun_namespace}/dataprotection-busybox:1.36"
            echo "operator_tags<<EOF"
            printf '%s\n' "${operator_tags[@]}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

  verify:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Bootstrap
        run: bash hack/bootstrap-dev-env.sh

      - name: Generate and test
        run: |
          make generate
          make manifests
          make test

  publish-images:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate registry configuration
        shell: bash
        env:
          ALIYUN_REGISTRY: ${{ needs.prepare.outputs.aliyun_registry }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          ALIYUN_USERNAME: ${{ secrets.ALIYUN_USERNAME }}
          ALIYUN_PASSWORD: ${{ secrets.ALIYUN_PASSWORD }}
        run: |
          set -euo pipefail
          [[ -n "${DOCKERHUB_USERNAME}" ]] || { echo "missing secret DOCKERHUB_USERNAME" >&2; exit 1; }
          [[ -n "${DOCKERHUB_TOKEN}" ]] || { echo "missing secret DOCKERHUB_TOKEN" >&2; exit 1; }
          [[ -n "${ALIYUN_REGISTRY}" ]] || { echo "missing variable ALIYUN_REGISTRY" >&2; exit 1; }
          [[ -n "${ALIYUN_USERNAME}" ]] || { echo "missing secret ALIYUN_USERNAME" >&2; exit 1; }
          [[ -n "${ALIYUN_PASSWORD}" ]] || { echo "missing secret ALIYUN_PASSWORD" >&2; exit 1; }

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login Aliyun registry
        uses: docker/login-action@v3
        with:
          registry: ${{ needs.prepare.outputs.aliyun_registry }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      - name: Build and push operator image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ needs.prepare.outputs.operator_tags }}

      - name: Mirror runtime images
        shell: bash
        env:
          MYSQL_DOCKERHUB: ${{ needs.prepare.outputs.mysql_dockerhub }}
          MYSQL_ALIYUN: ${{ needs.prepare.outputs.mysql_aliyun }}
          MC_DOCKERHUB: ${{ needs.prepare.outputs.mc_dockerhub }}
          MC_ALIYUN: ${{ needs.prepare.outputs.mc_aliyun }}
          BUSYBOX_DOCKERHUB: ${{ needs.prepare.outputs.busybox_dockerhub }}
          BUSYBOX_ALIYUN: ${{ needs.prepare.outputs.busybox_aliyun }}
        run: |
          set -euo pipefail
          docker buildx imagetools create --tag "${MYSQL_DOCKERHUB}" --tag "${MYSQL_ALIYUN}" mysql:8.0.45
          docker buildx imagetools create --tag "${MC_DOCKERHUB}" --tag "${MC_ALIYUN}" minio/mc:latest
          docker buildx imagetools create --tag "${BUSYBOX_DOCKERHUB}" --tag "${BUSYBOX_ALIYUN}" busybox:1.36

  build-installers:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - verify
    strategy:
      fail-fast: false
      matrix:
        arch:
          - amd64
          - arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build offline installer
        run: bash build.sh --arch ${{ matrix.arch }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: data-protection-operator-${{ matrix.arch }}
          path: dist/data-protection-operator-${{ matrix.arch }}.run*

  release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs:
      - build-installers
      - publish-images
    steps:
      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.run
            dist/**/*.sha256

