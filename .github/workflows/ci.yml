name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Configure Docker Hub mirror
        run: |
          echo '{"registry-mirrors":["https://mirror.gcr.io"]}' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-config-inline: |
            [registry."docker.io"]
              mirrors = ["mirror.gcr.io"]

      - name: Bootstrap
        run: bash hack/bootstrap-dev-env.sh

      - name: Module tidy check
        run: |
          make mod-tidy
          git diff --exit-code go.mod go.sum

      - name: Format check
        run: |
          make fmt
          git diff --exit-code

      - name: Generate
        run: |
          make generate
          git diff --exit-code

      - name: Manifests
        run: |
          make manifests
          git diff --exit-code

      - name: Unit tests
        run: make test

      - name: Assemble installer
        run: APP_VERSION="$(cat VERSION)" bash scripts/assemble-install.sh install.sh

      - name: Build amd64 installer
        run: bash build.sh --arch amd64

      - name: Upload installer smoke artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-smoke-amd64
          path: dist/data-protection-operator-amd64.run*
