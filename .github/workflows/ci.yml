name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Bootstrap
        run: bash hack/bootstrap-dev-env.sh

      - name: Format check
        run: |
          make fmt
          git diff --exit-code

      - name: Generate
        run: make generate

      - name: Manifests
        run: make manifests

      - name: Unit tests
        run: make test

      - name: Assemble installer
        run: APP_VERSION="$(cat VERSION)" bash scripts/assemble-install.sh install.sh

      - name: Build amd64 installer
        run: bash build.sh --arch amd64

      - name: Upload installer smoke artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-smoke-amd64
          path: dist/data-protection-operator-amd64.run*
