name: Build Addon Installers

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - ".github/workflows/addon-installers.yml"
      - "addons/**"
  pull_request:
    paths:
      - ".github/workflows/addon-installers.yml"
      - "addons/**"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        addon:
          - mysql
          - redis
          - minio
          - milvus
        arch:
          - amd64
          - arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Ensure executable permissions
        run: |
          chmod +x "addons/${{ matrix.addon }}/build.sh" "addons/${{ matrix.addon }}/install.sh"

      - name: Build addon installer
        working-directory: addons/${{ matrix.addon }}
        run: ./build.sh --arch "${{ matrix.arch }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dataprotection-addon-${{ matrix.addon }}-${{ matrix.arch }}
          path: |
            addons/${{ matrix.addon }}/dist/*.run
            addons/${{ matrix.addon }}/dist/*.sha256
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-24.04

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
