apiVersion: dataprotection.archinfra.io/v1alpha1
kind: BackupPolicy
metadata:
  name: mysql-prod-daily
  namespace: backup-system
spec:
  sourceRef:
    name: mysql-prod
  # One policy can fan out to multiple reusable storages.
  storageRefs:
    - name: minio-primary
    - name: nfs-secondary
  schedule:
    cron: "0 2 * * *"
    concurrencyPolicy: Forbid
  # Prefer a reusable RetentionPolicy for long-term governance.
  retentionPolicyRef:
    name: mysql-daily-retention
  # Inline retention is still convenient for quick smoke tests.
  retention:
    keepLast: 7
  verification:
    enabled: true
    mode: Metadata
