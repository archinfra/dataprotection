apiVersion: dataprotection.archinfra.io/v1alpha1
kind: RestoreRequest
metadata:
  name: mysql-prod-restore
  namespace: backup-system
spec:
  sourceRef:
    name: mysql-prod
  # 推荐优先使用 snapshotRef；保留 snapshot + repositoryRef 作为兼容入口
  snapshotRef:
    name: mysql-prod-manual-minio-dc2-snapshot
  target:
    mode: InPlace
    driverConfig:
      mysql:
        restoreMode: merge
