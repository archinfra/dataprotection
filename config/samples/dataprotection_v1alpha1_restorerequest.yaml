apiVersion: dataprotection.archinfra.io/v1alpha1
kind: RestoreRequest
metadata:
  name: mysql-prod-restore
  namespace: backup-system
spec:
  sourceRef:
    name: mysql-prod
  snapshot: latest
  repositoryRef:
    name: minio-dc2
  target:
    mode: InPlace
    driverConfig:
      mysql:
        restoreMode: merge
