apiVersion: dataprotection.archinfra.io/v1alpha1
kind: BackupAddon
metadata:
  name: mysql-dump
spec:
  displayName: MySQL Dump Addon
  version: 1.0.0
  supportedKinds:
    - MySQL
    - StatefulSet
  parameters:
    - name: database
      description: Optional database to dump.
    - name: dumpArgs
      description: Extra mysqldump arguments.
  backupTemplate:
    image: mysql:8.0.45
    command:
      - /bin/sh
    args:
      - -ceu
      - |
        mkdir -p /workspace/output
        dump_args="${DP_PARAM_DUMPARGS:-}"
        if [ -n "${DP_PARAM_DATABASE:-}" ]; then
          exec mysqldump -h"${DP_SOURCE_HOST}" -P"${DP_SOURCE_PORT}" -u"${DP_SOURCE_USERNAME}" -p"${DP_SOURCE_PASSWORD}" ${dump_args} "${DP_PARAM_DATABASE}" > /workspace/output/dump.sql
        fi
        exec mysqldump -h"${DP_SOURCE_HOST}" -P"${DP_SOURCE_PORT}" -u"${DP_SOURCE_USERNAME}" -p"${DP_SOURCE_PASSWORD}" ${dump_args} --all-databases > /workspace/output/dump.sql
  restoreTemplate:
    image: mysql:8.0.45
    command:
      - /bin/sh
    args:
      - -ceu
      - |
        test -f /workspace/input/dump.sql
        exec mysql -h"${DP_SOURCE_HOST}" -P"${DP_SOURCE_PORT}" -u"${DP_SOURCE_USERNAME}" -p"${DP_SOURCE_PASSWORD}" < /workspace/input/dump.sql
