apiVersion: dataprotection.archinfra.io/v1alpha1
kind: RestoreRequest
metadata:
  name: mysql-smoke-restore
  namespace: backup-system
spec:
  sourceRef:
    name: mysql-smoke
  snapshotRef:
    name: mysql-smoke-manual-minio-primary-snapshot
  target:
    mode: InPlace
    driverConfig:
      mysql:
        restoreMode: merge
