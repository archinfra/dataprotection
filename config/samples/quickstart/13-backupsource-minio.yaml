apiVersion: dataprotection.archinfra.io/v1alpha1
kind: BackupSource
metadata:
  name: minio-source
  namespace: backup-system
spec:
  driver: minio
  endpoint:
    scheme: http
    host: minio.minio.svc.cluster.local
    port: 9000
    usernameFrom:
      name: minio-source-auth
      key: access-key
    passwordFrom:
      name: minio-source-auth
      key: secret-key
  driverConfig:
    minio:
      # Leave buckets empty to back up all buckets.
      buckets:
        - app-data
      # Leave prefixes empty to mirror the whole bucket.
      prefixes:
        - tenant-a
