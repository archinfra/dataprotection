apiVersion: dataprotection.archinfra.io/v1alpha1
kind: BackupSource
metadata:
  name: redis-standalone
  namespace: backup-system
spec:
  driver: redis
  endpoint:
    host: redis-master.redis.svc.cluster.local
    port: 6379
    # Leave username empty when the deployment still uses classic requirepass.
    passwordFrom:
      name: redis-runtime-auth
      key: password
  driverConfig:
    redis:
      # The built-in addon currently ships the network-safe RDB snapshot flow.
      mode: rdb
