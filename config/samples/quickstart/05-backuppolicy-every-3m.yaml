apiVersion: dataprotection.archinfra.io/v1alpha1
kind: BackupPolicy
metadata:
  name: mysql-smoke-daily
  namespace: backup-system
spec:
  sourceRef:
    name: mysql-smoke
  storageRefs:
    - name: minio-primary
  schedule:
    cron: "*/3 * * * *"
    concurrencyPolicy: Forbid
  retentionPolicyRef:
    name: mysql-daily-retention
  retention:
    keepLast: 3
