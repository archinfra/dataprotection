apiVersion: dataprotection.archinfra.io/v1alpha1
kind: BackupRun
metadata:
  name: mysql-prod-manual
  namespace: backup-system
spec:
  policyRef:
    name: mysql-prod-daily
  sourceRef:
    name: mysql-prod
  # Optional: narrow a manual run to one storage instead of all policy storages.
  storageRefs:
    - name: minio-primary
  reason: "manual smoke backup"
